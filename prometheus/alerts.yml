groups:

  - name: synology_system
    rules:

      - alert: SynologyTargetDown
        expr: up{job="synology-snmp"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Synology NAS is unreachable"
          description: "SNMP target {{ $labels.instance }} has been down for more than 3 minutes."

      - alert: SynologySystemFailed
        expr: synology_system_status != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Synology system status is not normal"
          description: "System status on {{ $labels.instance }} is {{ $value }} (expected 1=Normal)."

      - alert: SynologyHighCPU
        expr: (100 - synology_cpu_idle) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on Synology"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}."

      - alert: SynologyHighMemory
        expr: (1 - synology_memory_available / synology_memory_total) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on Synology"
          description: "Memory usage is above 90% on {{ $labels.instance }}."

      - alert: SynologyHighTemperature
        expr: synology_system_temperature > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "System temperature is high"
          description: "System temperature is {{ $value }}C on {{ $labels.instance }}."

      - alert: SynologyPowerFailed
        expr: synology_power_status != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Power supply failure"
          description: "Power status is abnormal on {{ $labels.instance }}."

      - alert: SynologyFanFailed
        expr: synology_system_fan_status != 1 or synology_cpu_fan_status != 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Fan failure detected"
          description: "Fan status is abnormal on {{ $labels.instance }}."

  - name: synology_disk
    rules:

      - alert: SynologyDiskTemperatureHigh
        expr: synology_disk_temperature > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk temperature is high"
          description: "Disk {{ $labels.diskID }} is {{ $value }}C on {{ $labels.instance }}."

      - alert: SynologyDiskTemperatureCritical
        expr: synology_disk_temperature > 60
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk temperature is critical"
          description: "Disk {{ $labels.diskID }} is {{ $value }}C on {{ $labels.instance }}."

      - alert: SynologyDiskFailed
        expr: synology_disk_status != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk failure detected"
          description: "Disk {{ $labels.diskID }} status is {{ $value }} on {{ $labels.instance }}. Expected 1=Normal."

  - name: synology_storage
    rules:

      - alert: SynologyRaidDegraded
        expr: synology_raid_status != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAID is not normal"
          description: "RAID {{ $labels.raidName }} status is {{ $value }} on {{ $labels.instance }}. 1=Normal, 11=Degraded, 12=Crashed."

      - alert: SynologyVolumeSpaceLow
        expr: (synology_raid_total_size - synology_raid_free_size) / synology_raid_total_size * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Volume space is running low"
          description: "RAID {{ $labels.raidName }} is {{ $value }}% full on {{ $labels.instance }}."

      - alert: SynologyVolumeSpaceCritical
        expr: (synology_raid_total_size - synology_raid_free_size) / synology_raid_total_size * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Volume space is critically low"
          description: "RAID {{ $labels.raidName }} is {{ $value }}% full on {{ $labels.instance }}."

  - name: synology_ups
    rules:

      - alert: SynologyUPSLowBattery
        expr: synology_ups_battery_charge < 30
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "UPS battery is low"
          description: "UPS battery charge is {{ $value }}% on {{ $labels.instance }}."

      - alert: SynologyUPSHighLoad
        expr: synology_ups_load > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "UPS load is high"
          description: "UPS load is {{ $value }}% on {{ $labels.instance }}."

  - name: container_alerts
    rules:

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU"
          description: "Container {{ $labels.name }} CPU usage is {{ $value }}%."

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""} * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high memory"
          description: "Container {{ $labels.name }} is using {{ $value }}% of its memory limit."

      - alert: CadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "cAdvisor is unreachable"
          description: "cAdvisor target has been down for more than 3 minutes."
