global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "snmp-exporter"
    static_configs:
      - targets: ["snmp-exporter:9116"]

  - job_name: "synology-snmp"
    scrape_interval: 30s
    static_configs:
      - targets: ["192.168.1.150"]
        labels:
          device: "synology-nas"
    metrics_path: /snmp
    params:
      module: [synology]
      auth: [public_v2]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
