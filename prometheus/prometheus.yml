global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Synology NAS via SNMP
  - job_name: "synology-snmp"
    scrape_interval: 60s
    static_configs:
      - targets: ["192.168.1.100"]  # <-- replace with your NAS IP
        labels:
          device: "synology-nas"
    metrics_path: /snmp
    params:
      module: [synology]
      auth: [synology_v2]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # Container metrics via cAdvisor
  - job_name: "cadvisor"
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]

  # SNMP Exporter own metrics
  - job_name: "snmp-exporter"
    static_configs:
      - targets: ["snmp-exporter:9116"]
