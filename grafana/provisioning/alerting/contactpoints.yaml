apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "1889475594"
          message: |
            {{ range .Alerts }}🚨 {{ .Labels.alertname }}
            {{ .Annotations.summary }}
            {{ end }}
