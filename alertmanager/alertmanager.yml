global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - matchers:
        - severity = "critical"
      receiver: "telegram-critical"
      repeat_interval: 1h

    - matchers:
        - severity = "warning"
      receiver: "telegram-warning"
      repeat_interval: 4h

receivers:
  - name: "default"
    webhook_configs: []

  # ── Telegram: critical ─────────────────────────────────────
  # Replace YOUR_BOT_TOKEN and YOUR_CHAT_ID with real values.
  # Alertmanager does NOT support env var substitution.
  # Get bot token from @BotFather, chat_id from getUpdates API.
  - name: "telegram-critical"
    telegram_configs:
      - bot_token: "YOUR_BOT_TOKEN"
        chat_id: 0
        api_url: "https://api.telegram.org"
        parse_mode: "HTML"
        message: |
          <b>CRITICAL</b> {{ .GroupLabels.alertname }}
          {{ range .Alerts }}
          <b>{{ .Annotations.summary }}</b>
          {{ .Annotations.description }}
          {{ end }}

  # ── Telegram: warning ──────────────────────────────────────
  - name: "telegram-warning"
    telegram_configs:
      - bot_token: "YOUR_BOT_TOKEN"
        chat_id: 0
        api_url: "https://api.telegram.org"
        parse_mode: "HTML"
        message: |
          <b>WARNING</b> {{ .GroupLabels.alertname }}
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "instance"]
