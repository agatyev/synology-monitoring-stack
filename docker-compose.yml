services:

  snmp-exporter:
    image: prom/snmp-exporter:v0.29.0
    container_name: snmp-exporter
    restart: unless-stopped
    volumes:
      - ./snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    pid: "host"
    command:
      - "--path.rootfs=/host"
      - "--collector.processes"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($|/)"
    volumes:
      - /:/host:ro
    networks:
      - monitoring

  process-exporter:
    image: ncabatoff/process-exporter:v0.8.7
    container_name: process-exporter
    restart: unless-stopped
    user: "0"
    pid: "host"
    privileged: true
    command:
      - "--procfs=/host/proc"
      - "--config.path=/etc/process-exporter/config.yml"
      - "--threads=false"
    volumes:
      - /proc:/host/proc:ro
      - ./process_exporter/config.yml:/etc/process-exporter/config.yml:ro
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    restart: unless-stopped
    user: "0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-1y}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${VOLUME_BASE:-./data}/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - snmp-exporter
      - node-exporter
      - process-exporter

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    user: "0"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${VOLUME_BASE:-./data}/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge
