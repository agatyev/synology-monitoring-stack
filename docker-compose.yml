services:
  snmp-exporter:
    image: prom/snmp-exporter:v0.29.0
    restart: unless-stopped
    volumes:
      - ./snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    networks:
      - monitoring

  process-exporter:
    image: ncabatoff/process-exporter:v0.8.7
    restart: unless-stopped
    user: "0"
    pid: "host"
    privileged: true
    command:
      - "--procfs=/host/proc"
      - "--config.path=/etc/process-exporter/config.yml"
      - "--threads=false"
    volumes:
      - /proc:/host/proc:ro
      - ./process_exporter/config.yml:/etc/process-exporter/config.yml:ro
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    user: "0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-180d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - ${VOLUME_BASE:-./data}/prometheus:/prometheus
    networks:
      - monitoring
    depends_on:
      - snmp-exporter
      - process-exporter

  grafana:
    image: grafana/grafana:12.4.2
    restart: unless-stopped
    user: "0"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost:3000}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards/default.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./grafana/dashboards/default:/var/lib/grafana/dashboards/default:ro
      - ${VOLUME_BASE:-./data}/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge
