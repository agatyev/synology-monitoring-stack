services:

  # ─── Metrics: Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    restart: unless-stopped
    user: "0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ${VOLUME_BASE:-./data}/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - snmp-exporter

  # ─── Metrics: SNMP Exporter (Synology) ────────────────────────────
  snmp-exporter:
    image: prom/snmp-exporter:v0.29.0
    container_name: snmp-exporter
    restart: unless-stopped
    volumes:
      - ./snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks:
      - monitoring

  # ─── Metrics: cAdvisor (container stats) ──────────────────────────
  # NOTE: On Synology, Docker data lives at /volume1/@docker
  # If your volume differs (volume2, etc.), adjust the path below.
  # cAdvisor v0.51.0 is used because newer versions have known
  # compatibility issues with Synology DSM (inotify errors,
  # container factory registration failures).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /volume1/@docker:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - monitoring

  # ─── Logs: Loki ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    restart: unless-stopped
    user: "0"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - ${VOLUME_BASE:-./data}/loki:/loki
    ports:
      - "3100:3100"
    networks:
      - monitoring

  # ─── Logs: Promtail ───────────────────────────────────────────────
  # Receives syslog from Synology + scrapes Docker container logs
  # NOTE: Promtail is EOL since March 2026. Consider migrating to
  # Grafana Alloy in the future. Promtail still works but won't
  # receive new features or bug fixes.
  promtail:
    image: grafana/promtail:3.7.1
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - ${VOLUME_BASE:-./data}/promtail:/tmp/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /volume1/@docker/containers:/var/lib/docker/containers:ro
    ports:
      - "1514:1514"
      - "9080:9080"
    networks:
      - monitoring
    depends_on:
      - loki

  # ─── Visualization: Grafana ───────────────────────────────────────
  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    user: "0"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${VOLUME_BASE:-./data}/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

  # ─── Alerting: Alertmanager ───────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${VOLUME_BASE:-./data}/alertmanager:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
