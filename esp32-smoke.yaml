esphome:
  name: esp32-smoke

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  output_power: 20dB
  reboot_timeout: 5min
  manual_ip:
    static_ip: 192.168.1.49
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1

web_server:
  port: 80

prometheus:

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

bme680_bsec:
  address: 0x76
  iaq_mode: static
  supply_voltage: 3.3V
  sample_rate: lp
  state_save_interval: 6h

sensor:
  - platform: ccs811
    address: 0x5A
    eco2:
      name: "ccs811_eco2"
    tvoc:
      name: "ccs811_tvoc"
    update_interval: 10s

  - platform: bme680_bsec
    temperature:
      name: "bme680_temperature"
    pressure:
      name: "bme680_pressure"
    humidity:
      name: "bme680_humidity"
    gas_resistance:
      name: "bme680_gas_resistance"
    iaq:
      name: "bme680_iaq"

  - platform: sps30
    address: 0x69
    pm_1_0:
      name: "sps30_pm_1_0"
    pm_2_5:
      name: "sps30_pm_2_5"
    pm_4_0:
      name: "sps30_pm_4_0"
    pm_10_0:
      name: "sps30_pm_10_0"
    update_interval: 10s

  - platform: wifi_signal
    name: "wifi_signal"
    update_interval: 10s

  - platform: uptime
    name: "uptime"
    update_interval: 10s

text_sensor:
  - platform: bme680_bsec
    iaq_accuracy:
      name: "bme680_iaq_accuracy"
