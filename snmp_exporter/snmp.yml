# Synology SNMP module for prometheus snmp_exporter v0.29.0
# Based on Synology MIB Guide (enterprise OID: 1.3.6.1.4.1.6574)
# and standard UCD-SNMP, HOST-RESOURCES, IF-MIB
#
# To regenerate from MIBs: use the snmp_exporter generator tool
# https://github.com/prometheus/snmp_exporter/tree/main/generator

auths:
  synology_v2:
    community: public
    version: 2

modules:
  synology:
    # Scalar OIDs — single GET per OID (efficient)
    get:
      - 1.3.6.1.2.1.1.1.0         # sysDescr
      - 1.3.6.1.2.1.1.3.0         # sysUpTime
      - 1.3.6.1.4.1.6574.1.1.0    # systemStatus
      - 1.3.6.1.4.1.6574.1.2.0    # systemTemperature
      - 1.3.6.1.4.1.6574.1.3.0    # powerStatus
      - 1.3.6.1.4.1.6574.1.4.1.0  # systemFanStatus
      - 1.3.6.1.4.1.6574.1.4.2.0  # cpuFanStatus
      - 1.3.6.1.4.1.6574.1.5.1.0  # modelName
      - 1.3.6.1.4.1.6574.1.5.3.0  # DSM version
      - 1.3.6.1.4.1.6574.1.5.4.0  # upgradeAvailable
      - 1.3.6.1.4.1.2021.11.9.0   # ssCpuUser
      - 1.3.6.1.4.1.2021.11.10.0  # ssCpuSystem
      - 1.3.6.1.4.1.2021.11.11.0  # ssCpuIdle
      - 1.3.6.1.4.1.2021.4.5.0    # memTotalReal
      - 1.3.6.1.4.1.2021.4.6.0    # memAvailReal
      - 1.3.6.1.4.1.2021.4.14.0   # memBuffer
      - 1.3.6.1.4.1.2021.4.15.0   # memCached
      - 1.3.6.1.4.1.2021.10.1.3.1 # laLoad 1min
      - 1.3.6.1.4.1.2021.10.1.3.2 # laLoad 5min
      - 1.3.6.1.4.1.2021.10.1.3.3 # laLoad 15min

    # Table OIDs — SNMP WALK (walks the entire table)
    walk:
      - 1.3.6.1.4.1.6574.2.1      # synoDisk table
      - 1.3.6.1.4.1.6574.3.1      # synoRaid table
      - 1.3.6.1.4.1.6574.4        # synoUPS
      - 1.3.6.1.4.1.6574.101.1    # storageIO table
      - 1.3.6.1.4.1.6574.102.1    # spaceIO table
      - 1.3.6.1.2.1.2.2.1         # ifTable
      - 1.3.6.1.2.1.31.1.1        # ifXTable (64-bit counters)
      - 1.3.6.1.2.1.25.2.3        # hrStorageTable

    metrics:
      # ── System ─────────────────────────────────────────────
      - name: sysDescr
        oid: 1.3.6.1.2.1.1.1
        type: DisplayString
        help: System description.

      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: Uptime in hundredths of a second.

      # ── Synology System ────────────────────────────────────
      - name: synology_system_status
        oid: 1.3.6.1.4.1.6574.1.1
        type: gauge
        help: "1=Normal, 2=Failed"

      - name: synology_system_temperature
        oid: 1.3.6.1.4.1.6574.1.2
        type: gauge
        help: System temperature in Celsius.

      - name: synology_power_status
        oid: 1.3.6.1.4.1.6574.1.3
        type: gauge
        help: "1=Normal, 2=Failed"

      - name: synology_system_fan_status
        oid: 1.3.6.1.4.1.6574.1.4.1
        type: gauge
        help: "1=Normal, 2=Failed"

      - name: synology_cpu_fan_status
        oid: 1.3.6.1.4.1.6574.1.4.2
        type: gauge
        help: "1=Normal, 2=Failed"

      - name: synology_model_name
        oid: 1.3.6.1.4.1.6574.1.5.1
        type: DisplayString
        help: NAS model name.

      - name: synology_dsm_version
        oid: 1.3.6.1.4.1.6574.1.5.3
        type: DisplayString
        help: DSM firmware version.

      - name: synology_upgrade_available
        oid: 1.3.6.1.4.1.6574.1.5.4
        type: gauge
        help: "1=Available, 2=Unavailable, 3=Connecting, 4=Disconnected, 5=Other"

      # ── CPU (UCD-SNMP) ─────────────────────────────────────
      - name: synology_cpu_user
        oid: 1.3.6.1.4.1.2021.11.9
        type: gauge
        help: CPU user time percent.

      - name: synology_cpu_system
        oid: 1.3.6.1.4.1.2021.11.10
        type: gauge
        help: CPU system time percent.

      - name: synology_cpu_idle
        oid: 1.3.6.1.4.1.2021.11.11
        type: gauge
        help: CPU idle time percent.

      # ── Memory (UCD-SNMP) ──────────────────────────────────
      - name: synology_memory_total
        oid: 1.3.6.1.4.1.2021.4.5
        type: gauge
        help: Total RAM in kB.

      - name: synology_memory_available
        oid: 1.3.6.1.4.1.2021.4.6
        type: gauge
        help: Available RAM in kB.

      - name: synology_memory_buffer
        oid: 1.3.6.1.4.1.2021.4.14
        type: gauge
        help: Buffer memory in kB.

      - name: synology_memory_cached
        oid: 1.3.6.1.4.1.2021.4.15
        type: gauge
        help: Cached memory in kB.

      # ── Load Averages ──────────────────────────────────────
      - name: synology_load1
        oid: 1.3.6.1.4.1.2021.10.1.3
        type: DisplayString
        help: 1-minute load average.
        indexes:
          - labelname: laIndex
            type: gauge

      # ── Synology Disk (table) ──────────────────────────────
      - name: synology_disk_id
        oid: 1.3.6.1.4.1.6574.2.1.1.2
        type: DisplayString
        help: Disk ID string.
        indexes:
          - labelname: diskIndex
            type: gauge

      - name: synology_disk_model
        oid: 1.3.6.1.4.1.6574.2.1.1.3
        type: DisplayString
        help: Disk model name.
        indexes:
          - labelname: diskIndex
            type: gauge

      - name: synology_disk_type
        oid: 1.3.6.1.4.1.6574.2.1.1.4
        type: DisplayString
        help: Disk type (SATA, SAS, SSD).
        indexes:
          - labelname: diskIndex
            type: gauge

      - name: synology_disk_status
        oid: 1.3.6.1.4.1.6574.2.1.1.5
        type: gauge
        help: "1=Normal, 2=Initialized, 3=NotInitialized, 4=SystemPartitionFailed, 5=Crashed"
        indexes:
          - labelname: diskIndex
            type: gauge
        lookups:
          - labels: [diskIndex]
            labelname: diskID
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString

      - name: synology_disk_temperature
        oid: 1.3.6.1.4.1.6574.2.1.1.6
        type: gauge
        help: Disk temperature in Celsius.
        indexes:
          - labelname: diskIndex
            type: gauge
        lookups:
          - labels: [diskIndex]
            labelname: diskID
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString

      # ── Synology RAID (table) ──────────────────────────────
      - name: synology_raid_name
        oid: 1.3.6.1.4.1.6574.3.1.1.2
        type: DisplayString
        help: RAID volume name.
        indexes:
          - labelname: raidIndex
            type: gauge

      - name: synology_raid_status
        oid: 1.3.6.1.4.1.6574.3.1.1.3
        type: gauge
        help: "1=Normal, 2=Repairing, 3=Migrating, 4=Expanding, 5=Deleting, 6=Creating, 7=RaidSyncing, 8=RaidParityChecking, 9=RaidAssembling, 10=Cancelling, 11=Degraded, 12=CrashedUnrecoverable"
        indexes:
          - labelname: raidIndex
            type: gauge
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString

      - name: synology_raid_free_size
        oid: 1.3.6.1.4.1.6574.3.1.1.4
        type: gauge
        help: RAID free space in bytes.
        indexes:
          - labelname: raidIndex
            type: gauge
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString

      - name: synology_raid_total_size
        oid: 1.3.6.1.4.1.6574.3.1.1.5
        type: gauge
        help: RAID total space in bytes.
        indexes:
          - labelname: raidIndex
            type: gauge
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString

      # ── Synology UPS ───────────────────────────────────────
      - name: synology_ups_model
        oid: 1.3.6.1.4.1.6574.4.1.1
        type: DisplayString
        help: UPS model name.

      - name: synology_ups_status
        oid: 1.3.6.1.4.1.6574.4.2.1
        type: DisplayString
        help: "UPS status: OL=online, OB=on battery"

      - name: synology_ups_load
        oid: 1.3.6.1.4.1.6574.4.2.12.1
        type: gauge
        help: UPS load in percent.

      - name: synology_ups_battery_charge
        oid: 1.3.6.1.4.1.6574.4.3.1.1
        type: gauge
        help: UPS battery charge percent.

      # ── StorageIO (table, per-disk IO) ─────────────────────
      - name: synology_storageio_device
        oid: 1.3.6.1.4.1.6574.101.1.1.2
        type: DisplayString
        help: Storage IO device name.
        indexes:
          - labelname: storageioIndex
            type: gauge

      - name: synology_storageio_reads
        oid: 1.3.6.1.4.1.6574.101.1.1.5
        type: counter
        help: Number of read accesses.
        indexes:
          - labelname: storageioIndex
            type: gauge
        lookups:
          - labels: [storageioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      - name: synology_storageio_writes
        oid: 1.3.6.1.4.1.6574.101.1.1.6
        type: counter
        help: Number of write accesses.
        indexes:
          - labelname: storageioIndex
            type: gauge
        lookups:
          - labels: [storageioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      - name: synology_storageio_la
        oid: 1.3.6.1.4.1.6574.101.1.1.8
        type: gauge
        help: Storage load average (1 min).
        indexes:
          - labelname: storageioIndex
            type: gauge
        lookups:
          - labels: [storageioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      - name: synology_storageio_nread
        oid: 1.3.6.1.4.1.6574.101.1.1.12
        type: counter
        help: Bytes read (64-bit).
        indexes:
          - labelname: storageioIndex
            type: gauge
        lookups:
          - labels: [storageioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      - name: synology_storageio_nwritten
        oid: 1.3.6.1.4.1.6574.101.1.1.13
        type: counter
        help: Bytes written (64-bit).
        indexes:
          - labelname: storageioIndex
            type: gauge
        lookups:
          - labels: [storageioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      # ── SpaceIO (table, per-volume IO) ─────────────────────
      - name: synology_spaceio_device
        oid: 1.3.6.1.4.1.6574.102.1.1.2
        type: DisplayString
        help: Volume device name.
        indexes:
          - labelname: spaceioIndex
            type: gauge

      - name: synology_spaceio_nread
        oid: 1.3.6.1.4.1.6574.102.1.1.12
        type: counter
        help: Bytes read from volume (64-bit).
        indexes:
          - labelname: spaceioIndex
            type: gauge
        lookups:
          - labels: [spaceioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.102.1.1.2
            type: DisplayString

      - name: synology_spaceio_nwritten
        oid: 1.3.6.1.4.1.6574.102.1.1.13
        type: counter
        help: Bytes written to volume (64-bit).
        indexes:
          - labelname: spaceioIndex
            type: gauge
        lookups:
          - labels: [spaceioIndex]
            labelname: device
            oid: 1.3.6.1.4.1.6574.102.1.1.2
            type: DisplayString

      # ── Network Interfaces (IF-MIB table) ──────────────────
      - name: ifDescr
        oid: 1.3.6.1.2.1.2.2.1.2
        type: DisplayString
        help: Interface description.
        indexes:
          - labelname: ifIndex
            type: gauge

      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: "1=up, 2=down, 3=testing"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifSpeed
        oid: 1.3.6.1.2.1.2.2.1.5
        type: gauge
        help: Interface speed in bps.
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Inbound octets (64-bit).
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Outbound octets (64-bit).
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      # ── Host Resources Storage (table) ─────────────────────
      - name: hrStorageDescr
        oid: 1.3.6.1.2.1.25.2.3.1.3
        type: DisplayString
        help: Storage partition description.
        indexes:
          - labelname: hrStorageIndex
            type: gauge

      - name: hrStorageAllocationUnits
        oid: 1.3.6.1.2.1.25.2.3.1.4
        type: gauge
        help: Allocation unit size in bytes.
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString

      - name: hrStorageSize
        oid: 1.3.6.1.2.1.25.2.3.1.5
        type: gauge
        help: Total size in allocation units.
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString

      - name: hrStorageUsed
        oid: 1.3.6.1.2.1.25.2.3.1.6
        type: gauge
        help: Used space in allocation units.
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString

