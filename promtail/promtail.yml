server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── 1. Synology system logs via syslog ────────────────────
  # DSM Log Center → Log Sending → TCP, port 1514
  - job_name: synology-syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: synology-syslog
    relabel_configs:
      - source_labels: [__syslog_message_hostname]
        target_label: hostname
      - source_labels: [__syslog_message_severity]
        target_label: severity
      - source_labels: [__syslog_message_facility]
        target_label: facility
      - source_labels: [__syslog_message_app_name]
        target_label: app

  # ── 2. Docker container logs via service discovery ────────
  # Auto-discovers all running containers and tails their logs
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{job="docker-containers"}'
          stages:
            - regex:
                expression: "(?i)(?P<log_level>error|warn|info|debug|critical|fatal)"
            - labels:
                log_level:
